# iQSM – Docker Compose
#
# First-time setup (run once on the host — NOT inside the container):
#
#   mkdir -p demo checkpoints          ← IMPORTANT: do this before docker compose up
#   python run.py --download-demo      ← downloads demo NIfTIs into demo/
#   python run.py --download-checkpoints  ← downloads model weights into checkpoints/
#
# If you skip mkdir first, Docker will create demo/ and checkpoints/ as root-owned
# directories and downloads will fail with a permission error.
#
# Start the app:
#   docker compose build               ← first time only
#   docker compose up                  ← web app at http://localhost:7860
#
# demo/ and checkpoints/ are bind-mounted — the web app sees files immediately
# after downloading on the host, no container restart needed.

services:
  iqsm:
    build:
      context: .
      args:
        TORCH_VARIANT: cpu   # change to cu121 for NVIDIA GPU
    image: iqsm:latest
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/tmp/iqsm_outputs
      - ./demo:/iQSM/demo
      - ./checkpoints:/iQSM/checkpoints

    # NVIDIA GPU – uncomment below for Linux + NVIDIA GPU, set TORCH_VARIANT=cu121
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
