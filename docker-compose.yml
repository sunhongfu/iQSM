# iQSM – Docker Compose
# Usage:
#   docker compose build && docker compose up
#   Open http://localhost:7860
#
# Model checkpoints and demo data are downloaded automatically from
# Hugging Face Hub (huggingface.co/sunhongfu/iQSM) and cached in the
# named volume 'hf-cache', which persists across container restarts.

services:
  iqsm:
    build:
      context: .
      args:
        TORCH_VARIANT: cpu   # change to cu121 for NVIDIA GPU
    image: iqsm:latest
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/tmp/iqsm_outputs
      - hf-cache:/root/.cache/huggingface   # checkpoints + demo data persist here

    # NVIDIA GPU – uncomment below for Linux + NVIDIA GPU, set TORCH_VARIANT=cu121
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  hf-cache:
