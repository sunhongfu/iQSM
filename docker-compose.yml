# iQSM – Docker Compose
#
# First-time setup (run once on the host — NOT inside the container):
#
#   python run.py --download-checkpoints  ← downloads model weights into checkpoints/
#   python run.py --download-demo         ← (optional) downloads demo NIfTIs into demo/
#
# Start the app:
#   docker compose build               ← first time only
#   docker compose up                  ← web app at http://localhost:7860
#
# demo/ and checkpoints/ are bind-mounted — files downloaded on the host are
# visible inside the container immediately, no restart needed.

services:
  iqsm:
    build:
      context: .
      args:
        TORCH_VARIANT: cpu   # change to cu121 for NVIDIA GPU
    image: iqsm:latest
    ports:
      - "7860:7860"
    volumes:
      - ./demo:/iQSM/demo
      - ./checkpoints:/iQSM/checkpoints

    # NVIDIA GPU – uncomment below for Linux + NVIDIA GPU, set TORCH_VARIANT=cu121
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
