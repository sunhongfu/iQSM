# iQSM – Docker Compose
# Usage:
#   docker compose build && docker compose up
#   Open http://localhost:7860

services:
  iqsm:
    build:
      context: .
      args:
        TORCH_VARIANT: cpu   # change to cu121 for NVIDIA GPU
    image: iqsm:latest
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/tmp/iqsm_outputs
      - ./demo:/iQSM/demo               # demo NIfTIs — persists across restarts
      - ./iQSM_fcns:/iQSM/iQSM_fcns    # model checkpoints — persists across restarts
    restart: unless-stopped

    # NVIDIA GPU – uncomment below for Linux + NVIDIA GPU, set TORCH_VARIANT=cu121
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    # deploy:
    #   resources:
